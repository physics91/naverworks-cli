name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      - name: Binary canary
        run: make test-canary

      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build npm packages
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: ./npm/build-npm.sh "$VERSION" dist

      - name: Publish to npm (Trusted Publishing / OIDC)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          ROOT="$(pwd)"
          for dir in npm/linux-x64 npm/linux-arm64 npm/darwin-x64 npm/darwin-arm64 npm/win32-x64; do
            if [ -f "$dir/naverworks" ] || [ -f "$dir/naverworks.exe" ]; then
              (cd "$dir" && npm publish --access public --provenance)
            fi
          done
          (cd "$ROOT/npm/cli" && npm publish --access public --provenance)

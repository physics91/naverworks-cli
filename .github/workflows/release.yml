name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.22"

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build npm packages
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: ./npm/build-npm.sh "$VERSION" dist

      - name: Publish to npm (Trusted Publishing / OIDC)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          NPM_CONFIG_PROVENANCE: "true"
          NODE_AUTH_TOKEN: ""
        run: |
          ROOT="$(pwd)"
          for dir in npm/linux-x64 npm/linux-arm64 npm/darwin-x64 npm/darwin-arm64 npm/win32-x64; do
            if [ -f "$dir/naverworks" ] || [ -f "$dir/naverworks.exe" ]; then
              (cd "$dir" && npm publish --access public --provenance --loglevel=verbose)
            fi
          done
          (cd "$ROOT/npm/cli" && npm publish --access public --provenance --loglevel=verbose)

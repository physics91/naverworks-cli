version: 2

project_name: nw-cli

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: nw-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/physics91/naverworks-cli/cmd.version={{.Version}}
      - -X github.com/physics91/naverworks-cli/cmd.commit={{.ShortCommit}}
      - -X github.com/physics91/naverworks-cli/cmd.buildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
